<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar V4.0</title>
    <style>
        /* --- Masterpiece Gold Standard Styling --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    
        /* --- Header: Slimmed for Mobile --- */
        header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 10px; 
            text-align: center;
        }
    
        header h1 {
            font-size: 1.2rem; 
            margin: 5px 0;
        }
    
        header p {
            font-size: 0.8rem;
            margin: 0;
        }
    
        /* --- The Responsive Layout Container --- */
        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row; /* Desktop: Side-by-side */
        }
    
        /* Left Column: The Map (Dominant) */
        .chart-section {
            flex: 3; /* Increased from 2.5 to 3 to maximize map width */
            padding: 5px; 
            background: white;
            border-right: 1px solid #ddd;
            display: flex; /* Helps center the chart inside */
            align-items: center;
        }
    
        /* Right Column: The Cultural Dashboard */
        .info-section {
            flex: 1; 
            padding: 20px;
            background: #fafafa;
            max-width: 400px;
            overflow-y: auto; /* Adds scrolling if text is long */
        }
    
        /* --- Audio & Text Styling --- */
        .audio-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
    
        .audio-label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }
    
        audio {
            width: 100%;
        }
    
        #ai-summary {
            font-weight: bold; 
            line-height: 1.6;
            font-size: 1.05rem; /* Slightly larger for better readability */
        }
    
        /* --- Responsive Magic (Mobile Stacking) --- */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column; /* Stacked vertically */
            }
    
            .chart-section {
                height: 75vh; /* Force the map to take up most of the screen */
                border-right: none;
                border-bottom: 2px solid #d4af37; /* Visual gold separator */
            }
    
            .info-section {
                flex: none;
                padding: 20px;
                max-width: 100%;
            }
        }
    
        iframe, .flourish-embed {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Japanese Social Radar V4.0</h1>
    <p>Reading the "Invisible Air" with Generative AI</p>
</header>

<div class="main-container">
    <section class="chart-section">
        <iframe src="https://public.flourish.studio/visualisation/28074057/embed" title="Social Radar Map"></iframe>
    </section>

    <section class="info-section">
        <div id="instruction-note">
            <h3>Select a scenario on the map</h3>
            <p>Click a slice of the radar to hear the phrase and see the AI cultural analysis.</p>
        </div>

        <div class="audio-card">
            <span class="audio-label">🔊 Pronunciation & Nuance:</span>
            <audio id="radar-audio" controls src="audio/placeholder.wav">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="analysis-card">
            <h3>AI Cultural Summary</h3>
            <p id="ai-summary">Waiting for selection...</p>
        </div>
    </section>
</div>

<script>
    // 1. Your Master Data
    const radarData = {
        "Zensho shimasu": { audio: "zensho.wav", summary: "A strategic 'no'. Suggests effort without promising a result." },
        "Kentou kadai to sasete kudasai": { audio: "kentou.wav", summary: "A polite way to shelve an idea indefinitely." },
        "Chotto muzukashii...": { audio: "muzukashii.wav", summary: "The 'Invisible Wall'. Means impossible in a social context." },
        "Bubuzuke ikaga desu ka?": { audio: "bubuzuke.wav", summary: "The Kyoto-style signal that it is time for you to leave." },
        "Mae-muki ni kentou shimasu": { audio: "maemuki.wav", summary: "Avoids a direct 'no' by promising future consideration." },
        "Yoroshiku ne": { audio: "yoroshiku.wav", summary: "Senior-to-junior handoff. Implies full responsibility is now yours." },
        "Go-iken o ukagaitai": { audio: "goiken.wav", summary: "Seeking agreement for a decision that has already been made." },
        "Sekinin o tsuikan...": { audio: "tsuikan.wav", summary: "An apology that avoids taking personal blame." },
        "Isoganakute ii desu": { audio: "isoganakute.wav", summary: "Patient on the surface, but implies high expectations." },
        "Aru imi de...": { audio: "aruimi.wav", summary: "Signals that a critique or a shift in tone is coming." },
        "Gokai o osorezu ni...": { audio: "gokai.wav", summary: "I am about to be blunt and possibly rude." },
        "Kore wa kore de...": { audio: "korewa.wav", summary: "A backhanded compliment; it's not what was wanted." },
        "Kiku dake kikimasu": { audio: "kikudake.wav", summary: "I will listen, but I won't change my mind." },
        "Ma, tamatama desu": { audio: "tamatama.wav", summary: "Humility used to protect group harmony." },
        "Ma-a, sou desu ne...": { audio: "sou-desu-ne.wav", summary: "Stalling because they disagree but won't say it yet." },
        "Wakarimashita": { audio: "wakarimashita.wav", summary: "I heard you (does not mean I agree)." },
        "Iro-iro arimashite": { audio: "iro-iro.wav", summary: "A boundary marker. Don't ask for more details." },
        "O-isogashii tokoro...": { audio: "oisogashii.wav", summary: "Polite lubrication before a request." },
        "Kou-iu mono desu ga": { audio: "kouiu.wav", summary: "Establishing identity and hierarchy via business card." },
        "Benkyou sasete kudasai": { audio: "benkyou.wav", summary: "A request for a lower price." },
        "Sou iu koto nara...": { audio: "souiu.wav", summary: "A reluctant concession with reservations." }
    };

    // 2. The Robust Bridge
    window.addEventListener('message', function(e) {
        // Standard Flourish Script Embeds send data in this format:
        if (e.data && (e.data.type === 'flourish-click' || e.data.action === 'click')) {
            
            // Try to find the name in different possible Flourish data spots
            const clickedName = e.data.name || (e.data.data ? e.data.data.name : null);
            
            console.log("Radar detected click on:", clickedName); // DEBUG SPY

            if (clickedName && radarData[clickedName]) {
                const data = radarData[clickedName];

                // Update Audio
                const player = document.getElementById('radar-audio');
                player.src = 'audio/' + data.audio;
                player.load();
                player.play();

                // Update Text
                document.getElementById('ai-summary').innerText = data.summary;
                
                // Hide the instruction note
                document.getElementById('instruction-note').style.display = 'none';
            }
        }
    });
</script>

</body>
</html>
