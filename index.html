<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar V4.0</title>
    <style>
        /* --- Masterpiece Gold Standard Styling --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Changed from min-height to height */
            overflow: hidden; /* Prevent double scrolling on PC */
        }

        header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 8px; /* Extra slim */
            text-align: center;
            flex-shrink: 0;
        }

        header h1 { font-size: 1.1rem; margin: 0; }
        header p { font-size: 0.7rem; margin: 0; }

        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
        }

        /* Map gets the lion's share */
        .chart-section {
            flex: 3;
            background: white;
            min-height: 400px; /* Give it a guaranteed floor */
            height: 100%;
            position: relative;
            overflow: hidden;            
        }

        .info-section {
            flex: 1;
            padding: 20px;
            background: #fafafa;
            border-left: 1px solid #ddd;
            max-width: 380px;
            overflow-y: auto;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            body { overflow: auto; } /* Allow scrolling on mobile */
            .main-container { flex-direction: column; }
            
            .chart-section {
                height: 60vh; /* 60% of the screen height just for the map */
                width: 100vw;
                flex: none;
            }

            .info-section {
                max-width: 100%;
                border-left: none;
                border-top: 2px solid #d4af37;
            }
        }

        /* Ensure the Iframe takes every single pixel */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .audio-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        #ai-summary { font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <h1>Japanese Social Radar V4.0</h1>
        <p>Reading the "Invisible Air" with Generative AI</p>
    </header>

    <div class="main-container">
        <section class="chart-section">
            <div class="flourish-embed flourish-sunburst" data-src="visualisation/28074057" style="height:100vh;"></div>
        </section>

        <section class="info-section">
            <div id="instruction-note">
                <h3>Select a scenario on the map</h3>
                <p>Click a slice of the radar to hear the phrase and see the AI cultural analysis.</p>
            </div>

            <div class="audio-card">
                <span class="audio-label">🔊 Pronunciation & Nuance:</span>
                <audio id="radar-audio" controls src="audio/placeholder.wav"></audio>
            </div>

            <div class="analysis-card">
                <h3>AI Cultural Summary</h3>
                <p id="ai-summary">Waiting for selection...</p>
            </div>
        </section>
    </div>

    <script>
        // 1. Your Master Data
        const radarData = {
            "Zenshoshimasu": { audio: "zensho.wav", summary: "A strategic 'no'. Suggests effort without promising a result." },
            "Kentoukadaito": { audio: "kentou.wav", summary: "A polite way to shelve an idea indefinitely." },
            "Chottomuzukashii": { audio: "muzukashii.wav", summary: "The 'Invisible Wall'. Means impossible in a social context." },
            "Maemukinikentou": { audio: "maemuki.wav", summary: "Avoids a direct 'no' by promising future consideration." },
            "Yoroshikune": { audio: "yoroshiku.wav", summary: "Senior-to-junior handoff. Implies full responsibility is now yours." },
            "Goikenoukagaitai": { audio: "goiken.wav", summary: "Seeking agreement for a decision that has already been made." },
            "Sekininotsukan": { audio: "tsuikan.wav", summary: "An apology that avoids taking personal blame." },
            "Isoganakuteii": { audio: "isoganakute.wav", summary: "Patient on the surface, but implies high expectations." },
            "Aruimide": { audio: "aruimi.wav", summary: "Signals that a critique or a shift in tone is coming." },
            "Gokaioosorezu": { audio: "gokai.wav", summary: "I am about to be blunt and possibly rude." },
            "Korewakorede": { audio: "korewa.wav", summary: "A backhanded compliment; it's not what was wanted." },
            "Kikudakekikimasu": { audio: "kikudake.wav", summary: "I will listen, but I won't change my mind." },
            "Maa,tamatama": { audio: "tamatama.wav", summary: "Humility used to protect group harmony." },
            "Maa,soudesune": { audio: "sou-desu-ne.wav", summary: "Stalling because they disagree but won't say it yet." },
            "Wakarimashita": { audio: "wakarimashita.wav", summary: "I heard you (does not mean I agree)." },
            "Iroiroarimashite": { audio: "iro-iro.wav", summary: "A boundary marker. Don't ask for more details." },
            "Oisogashiitokoro": { audio: "oisogashii.wav", summary: "Polite lubrication before a request." },
            "Kouiumonodesuga": { audio: "kouiu.wav", summary: "Establishing identity and hierarchy via business card." },
            "Benkyousasete": { audio: "benkyou.wav", summary: "A request for a lower price." },
            "Souiukotonara": { audio: "souiu.wav", summary: "A reluctant concession with reservations." }
        };

       // Use the radarData you modified (the ones that match Flourish exactly)
        //const radarData = {
          //  "Zenshoshimasu": { audio: "zensho.wav", summary: "A strategic 'no'. Suggests effort without promising a result." },
            // ... (rest of your keys)
       // };

        // 2. THE LISTENER (The Bridge)
        window.addEventListener('message', function(e) {
        // Prepare the data (sometimes Flourish sends a 'string' instead of an 'object')
            let data = e.data;
            if (typeof e.data === 'string') {
                try { data = JSON.parse(e.data); } catch (err) { return; }
            }

            // Check if the signal is a "click"
            if (data && (data.type === 'flourish-click' || data.action === 'click')) {
                
                // Grab the name from the click
                const clickedName = data.name || (data.data ? data.data.name : "NAME_NOT_FOUND");
                
                // ALERT: This is our diagnostic tool. It MUST pop up now!
                alert("Bridge detected: [" + clickedName + "]");

                // 3. THE LOGIC (Inside the listener)
                if (clickedName && radarData[clickedName]) {
                    const info = radarData[clickedName];

                    // Update & Play Audio
                    const player = document.getElementById('radar-audio');
                    player.src = 'audio/' + info.audio;
                    player.load();
                    player.play().catch(err => alert("Audio Error: " + err.message));

                    // Update the AI Summary text
                    document.getElementById('ai-summary').innerText = info.summary;
                    
                    // Hide the "Select a scenario" instruction
                    const note = document.getElementById('instruction-note');
                    if (note) note.style.display = 'none';
                    
                } else {
                    // If it clicks but doesn't match your dictionary keys
                    alert("No match found for: [" + clickedName + "]");
                }
            }
        });
    </script>
    <script src="https://public.flourish.studio/resources/embed.js"></script>
</body>
</html>
