<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar V4.0</title>
    <style>
        /* --- Masterpiece Gold Standard Styling --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 8px;
            text-align: center;
            flex-shrink: 0;
        }

        header h1 { font-size: 1.1rem; margin: 0; }
        header p { font-size: 0.7rem; margin: 0; }

        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
        }

        .chart-section {
            flex: 3;
            background: white;
            position: relative;
        }

        .info-section {
            flex: 1;
            padding: 20px;
            background: #fafafa;
            border-left: 1px solid #ddd;
            max-width: 380px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            body { overflow: auto; }
            .main-container { flex-direction: column; }
            .chart-section { height: 65vh; width: 100vw; flex: none; }
            .info-section { max-width: 100%; border-left: none; border-top: 2px solid #d4af37; }
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .audio-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        #ai-summary { font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <h1>Japanese Social Radar V4.0</h1>
        <p>Reading the "Invisible Air" with Generative AI</p>
    </header>

    <div class="main-container">
        <section class="chart-section">
            <iframe src="https://public.flourish.studio/visualisation/28074057/embed" title="Social Radar Map"></iframe>
        </section>

        <section class="info-section">
            <div id="instruction-note">
                <h3>Select a scenario on the map</h3>
                <p>Click a slice of the radar to hear the phrase and see the AI cultural analysis.</p>
            </div>

            <div class="audio-card">
                <span class="audio-label">🔊 Pronunciation & Nuance:</span>
                <audio id="radar-audio" controls src="audio/placeholder.wav">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="analysis-card">
                <h3>AI Cultural Summary</h3>
                <p id="ai-summary">Waiting for selection...</p>
            </div>
        </section>
    </div>

    <script>
        const radarData = {
            "Zenshoshimasu": { audio: "zensho.wav", summary: "A strategic 'no'. Suggests effort without promising a result." },
            "Kentoukadaito": { audio: "kentou.wav", summary: "A polite way to shelve an idea indefinitely." },
            "Chottomuzukashii": { audio: "muzukashii.wav", summary: "The 'Invisible Wall'. Means impossible in a social context." },
            "Maemukinikentou": { audio: "maemuki.wav", summary: "Avoids a direct 'no' by promising future consideration." },
            "Yoroshikune": { audio: "yoroshiku.wav", summary: "Senior-to-junior handoff. Implies full responsibility is now yours." },
            "Goikenoukagaitai": { audio: "goiken.wav", summary: "Seeking agreement for a decision that has already been made." },
            "Sekininotsukan": { audio: "tsuikan.wav", summary: "An apology that avoids taking personal blame." },
            "Isoganakuteii": { audio: "isoganakute.wav", summary: "Patient on the surface, but implies high expectations." },
            "Aruimide": { audio: "aruimi.wav", summary: "Signals that a critique or a shift in tone is coming." },
            "Gokaioosorezu": { audio: "gokai.wav", summary: "I am about to be blunt and possibly rude." },
            "Korewakorede": { audio: "korewa.wav", summary: "A backhanded compliment; it's not what was wanted." },
            "Kikudakekikimasu": { audio: "kikudake.wav", summary: "I will listen, but I won't change my mind." },
            "Maatamatama": { audio: "tamatama.wav", summary: "Humility used to protect group harmony." },
            "Maasoudesune": { audio: "sou-desu-ne.wav", summary: "Stalling because they disagree but won't say it yet." },
            "Wakarimashita": { audio: "wakarimashita.wav", summary: "I heard you (does not mean I agree)." },
            "Iroiroarimashite": { audio: "iro-iro.wav", summary: "A boundary marker. Don't ask for more details." },
            "Oisogashiitokoro": { audio: "oisogashii.wav", summary: "Polite lubrication before a request." },
            "Kouiumonodesuga": { audio: "kouiu.wav", summary: "Establishing identity and hierarchy via business card." },
            "Benkyousasete": { audio: "benkyou.wav", summary: "A request for a lower price." },
            "Souiukotonara": { audio: "souiu.wav", summary: "A reluctant concession with reservations." }
        };

        window.addEventListener('message', function(e) {
            if (e.data && (e.data.type === 'flourish-click' || e.data.action === 'click')) {
                const rawName = e.data.name || (e.data.data ? e.data.data.name : "NAME_NOT_FOUND");
                
                // FUZZY MATCH LOGIC: Removes spaces, dots, and commas to find the key
                const cleanName = rawName.replace(/[\s\.,]/g, ''); 
                
                alert("Bridge detected: [" + rawName + "]\nSearching for: [" + cleanName + "]");

                if (cleanName && radarData[cleanName]) {
                    const data = radarData[cleanName];
                    const player = document.getElementById('radar-audio');
                    player.src = 'audio/' + data.audio;
                    player.load();
                    player.play().catch(err => alert("Audio Error: " + err.message));

                    document.getElementById('ai-summary').innerText = data.summary;
                    if(document.getElementById('instruction-note')) {
                        document.getElementById('instruction-note').style.display = 'none';
                    }
                } else {
                    alert("No match found for: [" + cleanName + "]");
                }
            }
        });
    </script>
</body>
</html>
