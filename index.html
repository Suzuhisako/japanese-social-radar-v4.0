<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar V4.0</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
        }

        /* Simplified Chart Section - No more Iframe CSS! */
        .chart-section {
            flex: 3;
            background: white;
            position: relative;
            min-height: 400px; /* Forces space for the map */
        }

        .info-section {
            flex: 1;
            padding: 20px;
            background: #fafafa;
            border-left: 1px solid #ddd;
            max-width: 380px;
            overflow-y: auto;
        }

        /* 1. Standard Desktop View */
        .flourish-iframe-bridge {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 2. Unified Mobile Adjustments */
        @media (max-width: 768px) {
            body { 
                overflow: auto; 
            }
            .main-container { 
                flex-direction: column; 
            }
            .chart-section { 
                height: 60vh; /* Map height on mobile */
                width: 100vw; 
                flex: none; 
            }
            .flourish-iframe-bridge {
                height: 100%; /* Fills the 60vh chart-section */
            }
            .info-section { 
                max-width: 100%; 
                border-left: none; 
                border-top: 2px solid #d4af37; 
                padding-bottom: 50px; 
            }
        }

        .audio-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Japanese Social Radar V4.0</h1>
        <p>Reading the "Invisible Air" with Generative AI</p>
    </header>

    <div class="main-container">
        <section class="chart-section">
            <iframe src="https://flo.uri.sh/visualisation/28074057/embed?auto=1&interaction=true" 
                    class="flourish-iframe-bridge">
            </iframe>
        </section>

        <section class="info-section">
            <div id="instruction-note">
                <h3>Select a scenario on the map</h3>
                <p>Hover over a slice of the radar to hear the phrase and see the analysis.</p>
            </div>
            <div class="audio-card">
                <audio id="radar-audio" controls src="audio/placeholder.wav"></audio>
            </div>
            <div class="analysis-card">
                <h3>AI Cultural Summary</h3>
                <p id="ai-summary">Waiting for selection...</p>
            </div>
        </section>
    </div>

    <script>
        // 1. Your Master Data
        const radarData = {
            "Zenshoshimasu": { audio: "zensho.wav", summary: "A strategic 'no'. Suggests effort without promising a result." },
            "Kentoukadaito": { audio: "kentou.wav", summary: "A polite way to shelve an idea indefinitely." },
            "Chottomuzukashii": { audio: "muzukashii.wav", summary: "The 'Invisible Wall'. Means impossible in a social context." },
            "Maemukinikentou": { audio: "maemuki.wav", summary: "Avoids a direct 'no' by promising future consideration." },
            "Yoroshikune": { audio: "yoroshiku.wav", summary: "Senior-to-junior handoff. Implies full responsibility is now yours." },
            "Goikenoukagaitai": { audio: "goiken.wav", summary: "Seeking agreement for a decision that has already been made." },
            "Sekininotsukan": { audio: "tsuikan.wav", summary: "An apology that avoids taking personal blame." },
            "Isoganakuteii": { audio: "isoganakute.wav", summary: "Patient on the surface, but implies high expectations." },
            "Aruimide": { audio: "aruimi.wav", summary: "Signals that a critique or a shift in tone is coming." },
            "Gokaioosorezu": { audio: "gokai.wav", summary: "I am about to be blunt and possibly rude." },
            "Korewakorede": { audio: "korewa.wav", summary: "A backhanded compliment; it's not what was wanted." },
            "Kikudakekikimasu": { audio: "kikudake.wav", summary: "I will listen, but I won't change my mind." },
            "Maa,tamatama": { audio: "tamatama.wav", summary: "Humility used to protect group harmony." },
            "Maa,soudesune": { audio: "sou-desu-ne.wav", summary: "Stalling because they disagree but won't say it yet." },
            "Wakarimashita": { audio: "wakarimashita.wav", summary: "I heard you (does not mean I agree)." },
            "Iroiroarimashite": { audio: "iro-iro.wav", summary: "A boundary marker. Don't ask for more details." },
            "Oisogashiitokoro": { audio: "oisogashii.wav", summary: "Polite lubrication before a request." },
            "Kouiumonodesuga": { audio: "kouiu.wav", summary: "Establishing identity and hierarchy via business card." },
            "Benkyousasete": { audio: "benkyou.wav", summary: "A request for a lower price." },
            "Souiukotonara": { audio: "souiu.wav", summary: "A reluctant concession with reservations." }
        };

        
    
        // 2. THE LISTENER: This "hears" when the popup link is clicked
        window.addEventListener('hashchange', function() {
            // Get the phrase from the URL (e.g., "#Zenshoshimasu" -> "Zenshoshimasu")
            const clickedPhrase = window.location.hash.substring(1); 
            
            if (clickedPhrase) {
                console.log("🔗 Bridge Active: Link detected for", clickedPhrase);
                triggerRadar(clickedPhrase);
            }
            
            // Clean the URL hash so the user can click the same slice again
            history.replaceState(null, null, ' ');
        });

        // 3. THE ACTION: Updates the UI and plays audio
        function triggerRadar(name) {
            // Find the matching key (case-insensitive for safety)
            const key = Object.keys(radarData).find(k => k.toLowerCase() === name.toLowerCase());
            
            if (key) {
                const info = radarData[key];
                const player = document.getElementById('radar-audio');
                const summaryBox = document.getElementById('ai-summary');
                const note = document.getElementById('instruction-note');

                // Update Audio
                player.src = 'audio/' + info.audio;
                player.load();
                player.play().catch(e => console.log("Playback requires a manual click first."));

                // Update Text
                summaryBox.innerText = info.summary;
                if (note) note.style.display = 'none';
                
                console.log("✅ Successfully synced AI Analysis for:", key);
            } else {
                console.log("⚠️ No audio data found for phrase:", name);
            }
        }
    </script>


    <script src="https://public.flourish.studio/resources/embed.js"></script>

</body>
</html>
