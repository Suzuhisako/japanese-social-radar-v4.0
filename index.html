<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar | AI Cultural Analysis</title>
    <style>
        
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* CHANGE: Allow overflow on mobile so popups can be seen */
            overflow-x: hidden; 
            overflow-y: auto; 
        }
        
        .main-container {
            display: flex;
            flex: 1;
            /* CHANGE: Remove overflow hidden so popups aren't clipped */
            overflow: visible !important; 
        }

        .master-header {
            background-color: #ffffff;
            padding: 5px 30px; /* Minimal vertical padding */
            border-bottom: 2px solid #d4af37;
            display: flex;
            align-items: center; /* Aligns everything on one horizontal line */
            justify-content: flex-start; /* Keeps everything to the left */
            height: 45px; /* Forced slim height */
            width: 100%;
            box-sizing: border-box;
        }

        .master-header h1 {
            margin: 0;
            font-size: 1.1rem; /* Smaller font to fit on one line */
            letter-spacing: 2px;
            color: #222;
            white-space: nowrap; /* Prevents text from wrapping to a second line */
        }

        .subtitle {
            margin: 0 0 0 20px; /* Pushes the subtitle to the right of the title */
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .version-tag {
            font-size: 0.65rem;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 1px 5px;
            margin-left: 10px;
            border-radius: 3px;
            font-weight: bold;
        }
        
             
       /* THE LEFT SIDE (CHART GALLERY) */
         /* THE LEFT SIDE (CHART GALLERY) */
        .chart-section {
            flex: 4; 
            background: #fdfdfd; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
            padding: 0;
            /* ADD THIS: Ensure the container doesn't chop off the popups */
            overflow: visible !important;
        }
                
        /* THE RINGS (INSIDE THE GALLERY) */
        .flourish-embed {
            width: 90% !important;
            max-width: 1000px;
            margin: 0 auto !important;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ADD THESE TWO LINES */
            position: relative;
            z-index: 9999 !important; /* Forces popups to sit ABOVE the sidebar */
        }

        /* THE ANALYSIS SIDEBAR (THE RIGHT SIDE) */
        .info-section {
            flex: 1; 
            min-width: 350px;
            max-width: 450px;
            padding: 40px;
            background-color: #ffffff;
            border-left: 2px solid #d4af37; 
            overflow-y: auto;
            box-shadow: -10px 0 20px rgba(0,0,0,0.03);
        }

        .analysis-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .analysis-header h2 {
            color: #d4af37;
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        
        /* 4. The Analysis Text */
        #ai-summary {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #2c3e50;
            font-family: 'Georgia', serif;
            font-style: italic;
            /*transition: opacity 0.3s ease;*/
            animation: fadeIn 0.5s;
            transition: all 0.5s ease-in-out;
        }

        /* This class will be toggled by the script */
        .updated-text {
            animation: slideIn 0.6s ease-out;
        }

       
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #instruction-note {
            color: #999;
            font-size: 1rem;
            line-height: 1.6;
        }

       @media (max-width: 768px) {
            body { 
                overflow: auto !important; /* Allow the whole page to breathe */
            }
            
            .main-container { 
                flex-direction: column; 
                height: auto; /* Let the container grow if the panel is large */
                overflow: visible !important; 
            }
        
            .chart-section { 
                height: 70vh; /* Give the rings a fixed area */
                width: 100vw; 
                flex: none;
                overflow: visible !important; /* CRITICAL: Allows the Panel to show up */
                position: relative;
                z-index: 10;
            }
        
            .info-section { 
                max-width: 100%; 
                border-left: none; 
                border-top: 3px solid #d4af37; 
                z-index: 5; /* Lower than the chart so the Panel slides OVER it */
            }
        }

    </style>
</head>
<body>
    <header class="master-header">
        <div class="logo-area">
            <h1>JAPANESE SOCIAL RADAR <span class="version-tag">v4.0</span></h1>
            <p class="subtitle">A Behavioral Dictionary & Cultural OS</p>
        </div>
    </header>

    <div class="main-container">
        <section class="chart-section">
            <div class="flourish-embed flourish-sunburst flourish-iframe-bridge" data-src="visualisation/28074057"></div>
        </section>

        <section class="info-section">
            <div class="analysis-header">
                <h2>AI Cultural Analysis Report</h2>
            </div>   
            
            
            <div id="instruction-note">
                <p>Hover a slice and listen to Audio Nuance. <br> Click "Read AI Cultural Analysis" to show AI analysis.</br></p>
            </div>

            <div id="ai-summary">
                    </div>
            <p style="font-size: 14px; color: #190e0e; margin-top: 20px; font-style: italic;">
                💡 Tip: Click on the popup and close it to select a new cultural phrase.
            </p>
            
        </section>
    </div>

    <script>
        // THE DATA MIRROR (Your 20 Masterpiece Analyses)
        const radarData = {
            "zenshoshimasu": { audio: "zensho.wav", summary: "The 'Stalling Commitment.' While it translates to 'doing my best,' it is a strategic ambiguity used to exit a conversation without making a promise. It suggests effort will be made, but provides a safety net if no result follows." },
            "kentoukadaito": { audio: "kentou.wav", summary: "The 'Polite Shelf.' Signals that a proposal is under 'serious consideration' or is a 'task for future study.' In reality, this usually means the idea has been shelved indefinitely to avoid the friction of a direct 'no'." },
            "chottomuzukashii": { audio: "muzukashii.wav", summary: "The 'Invisible Wall.' Literally means 'a little difficult,' but in a Japanese social context, it is a definitive 'impossible.' Saying 'no' directly is considered rude; this phrase protects the relationship while closing the door." },
            "maemukinikentou": { audio: "maemuki.wav", summary: "The 'Positive Dead-End.' By promising 'positive consideration,' the speaker maintains a friendly atmosphere while buying time. It is a classic business tactic to delay a final decision without appearing uncooperative." },
            "yoroshikune": { audio: "yoroshiku.wav", summary: "The 'Hierarchical Handoff.' Often used by seniors to juniors. While it sounds like a friendly 'nice to meet you' or 'thanks,' it often implies: 'I am handing full responsibility for this task to you now; don’t let me down.'" },
            "goikenoukagaitai": { audio: "goiken.wav", summary: "The 'Performative Consensus.' Seeking an 'opinion' on a decision that has usually already been finalized behind the scenes (Nemawashi). It is a ritual to ensure everyone feels included in the group harmony." },
            "sekininotsukan": { audio: "tsukan.wav", summary: "The 'Passive Apology.' Translates to 'feeling the weight of responsibility.' It is a formal way to acknowledge a mistake while subtly avoiding personal blame by framing the issue as a heavy, abstract burden." },
            "isoganakuteii": { audio: "isoganakute.wav", summary: "The 'Patience Test.' On the surface, it means 'no rush.' However, because of the high-context culture, it often signals that the speaker is actually waiting and expects high-quality results exactly when they are needed." },
            "aruimide": { audio: "aruimi.wav", summary: "The 'Tone Shifter.' Means 'in a sense.' It acts as a linguistic shield, signaling that the speaker is about to offer a critique or a shift in perspective that might otherwise sound too harsh or direct." },
            "gokaioosorezu": { audio: "gokai.wav", summary: "The 'Bluntness Warning.' 'Without fear of being misunderstood.' This is a polite disclaimer used right before the speaker says something unusually direct, blunt, or potentially controversial." },
            "korewakorede": { audio: "korewa.wav", summary: "The 'Backhanded Acceptance.' It acknowledges that the current result has 'its own value,' which is a subtle way of saying it wasn't exactly what was wanted or expected." },
            "kikudakekikimasu": { audio: "kikudake.wav", summary: "The 'Closed Ear.' 'I will listen.' It establishes that the speaker is fulfilling their social duty to hear you out, but they have no intention of changing their mind or taking action based on what you say." },
            "maatamatama": { audio: "tamatama.wav", summary: "The 'Harmony Shield.' Attributing success to 'coincidence' or 'luck' rather than skill. This humility prevents the speaker from standing out too much, which preserves the balance and ego of the group." },
            "maasoudesune": { audio: "soudesu-ne.wav", summary: "The 'Stalling Agreement.' A neutral filler used when the speaker disagrees or is surprised but wants to avoid an immediate confrontation. It buys seconds of thinking time to formulate a safe response." },
            "wakarimashita": { audio: "wakarimashita.wav", summary: "The 'Reception Receipt.' Simply means 'I have received the information.' It is often mistaken by Westerners as 'I agree,' but it strictly means 'I understand your words,' not necessarily your intent." },
            "iroiroarimashite": { audio: "iroiro.wav", summary: "The 'Privacy Gate.' 'Various things happened.' This is a firm boundary marker. It tells the listener that the topic is complicated or personal, and that they should stop asking for further details." },
            "oisogashiitokoro": { audio: "oisogashii.wav", summary: "The 'Social Lubricant.' A standard greeting acknowledging the other person's busyness. It is used to soften the impact of an upcoming request or interruption, showing respect for their time." },
            "kouiumonodesuga": { audio: "kouiu.wav", summary: "The 'Identity Anchor.' Used during business card exchange. It goes beyond a name, signaling the speaker's place within their organization and the hierarchy of the current meeting." },
            "benkyousasete": { audio: "benkyou.wav", summary: "The 'Price Negotiator.' Literally 'let me study.' In a commercial context, this is the standard code for 'give me a discount' or 'lower your quote,' framed as a learning opportunity for the speaker." },
            "souiukotonara": { audio: "souiu.wav", summary: "The 'Reluctant Concession.' 'If that is the case.' It signals that the speaker is agreeing to terms they aren't entirely happy with, but are accepting due to the circumstances or pressure." }
        };

       // Listen for the Flourish "click" event
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'click') {
                const selectedPhrase = e.data.data[0]; // Gets the phrase from the ring
                updateSidebar(selectedPhrase);
                
                // AUTO-SCROLL for Mobile: 
                // This jumps the user down to the analysis so they see it immediately.
                if (window.innerWidth <= 768) {
                    document.querySelector('.info-section').scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
        
        function updateSidebar(phrase) {
            const output = document.getElementById('ai-summary');
            
            // We match the phrase to your scenario data
            const data = scenarioData[phrase]; 
            
            output.innerHTML = `
                <div class="analysis-header">
                    <h2>${data.fullTitle}</h2>
                    <div class="audio-container" style="margin: 15px 0;">
                        <audio controls style="width: 100%; height: 40px;">
                            <source src="${data.audioUrl}" type="audio/wav">
                            Your browser does not support the audio element.
                        </audio>
                    </div>
                </div>
                <div class="updated-text">${data.content}</div>
            `;
        }
    </script>

    <script src="https://public.flourish.studio/resources/embed.js"></script>

</body>
</html>
