<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Social Radar V4.0</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

       header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 0 30px;          /* Side padding only */
            display: flex;             /* Align items side-by-side */
            align-items: center;       /* Vertical center */
            justify-content: flex-start; /* Push everything to the left */
            flex-shrink: 0;
            height: 50px;              /* Locked slim height */
            border-bottom: 1px solid #d4af37;
        }
        
        header h1 {
            margin: 0;
            font-size: 1.1rem;         /* Smaller professional size */
            letter-spacing: 2px;
            white-space: nowrap;       /* Prevents wrapping */
        }
        
        /* Use a span or a separate p tag for your subtitle if you have one */
        header .subtitle {
            margin-left: 20px;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 1px solid #444;
            padding-left: 20px;
            display: inline-block;
        }

        .main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
        }

        /* Simplified Chart Section - No more Iframe CSS! */
        .chart-section {
            flex: 3;
            background: white;
            position: relative;
            min-height: 400px; /* Forces space for the map */
        }

        .info-section {
            flex: 1;
            max-width: 400px;
            padding: 40px;
            background-color: #ffffff;
            border-left: 2px solid #d4af37; /* The Gold Standard Line */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
        }

        #ai-summary {
            font-size: 1.1rem;
            line-height: 1.8; /* More space between lines for readability */
            color: #333;
            font-family: 'Georgia', serif; /* A classic, professional font for analysis */
            margin-top: 20px;
            font-style: italic;
            transition: all 0.5s ease; /* Smooth fade when text changes */
        }

        /* 1. Standard Desktop View */
        .flourish-iframe-bridge {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Mobile Polish */
        @media (max-width: 768px) {
            .info-section {
                max-width: 100%;
                padding: 25px;
                border-left: none;
                border-top: 3px solid #d4af37;
            }
            #ai-summary {
                font-size: 1rem;
            }
        }

       
        @media (max-width: 768px) {
            body { 
                overflow: auto; 
            }
            .main-container { 
                flex-direction: column; 
            }
            .chart-section { 
                height: 60vh; /* Map height on mobile */
                width: 100vw; 
                flex: none; 
            }
            .flourish-iframe-bridge {
                height: 100%; /* Fills the 60vh chart-section */
            }
            .info-section { 
                max-width: 100%; 
                border-left: none; 
                border-top: 2px solid #d4af37; 
                padding-bottom: 50px; 
            }
        }

        .audio-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>JAPANESE SOCIAL RADAR <small style="font-size: 0.6rem; vertical-align: middle; margin-left: 5px; opacity: 0.7;">v4.0</small></h1>
        <p class="subtitle">A Behavioral Dictionary & Cultural OS</p>
    </header>

    <div class="main-container">
        <section class="chart-section" style="width: 100%; max-width: 900px; margin: 0 auto;">
            <iframe src="https://flo.uri.sh/visualisation/28074057/embed?auto=1&interaction=true" 
                    class="flourish-iframe-bridge"
                    style="width: 100%; height: 650px; border: none;"
                    allow="autoplay">
            </iframe>
        </section>

        <section class="info-section">
            <div id="instruction-note" style="padding: 15px; background: #fdfdfd; border: 1px dashed #ccc; border-radius: 8px; margin-bottom: 20px;">
                <h3>Explore the Social Radar</h3>
                <p>Hover a slice to hear the phrase in Japanese with nuances. </p>
            </div>
            
            <div class="analysis-card" style="padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #007bff;">
                <h3 style="margin-top: 0; color: #007bff;">AI Cultural Summary</h3>
                <p id="ai-summary" style="font-size: 1.1em; line-height: 1.6; color: #333; min-height: 100px;">
                    <i>Waiting for selection...</i>
                </p>
            </div>
        </section>
    </div>

    <script>
        // 1. Your Master Data
        const radarData = {
            
            "zenshoshi": {
                title: "善処します (Zenshoshimasu)",
                audioUrl: "audio/zensho.wav",
                analysis: "In business, this is a polite 'I will look into it,' but often functions as a way to end a negotiation without a 'Yes.' It maintains harmony while avoiding commitment."
            },
            "kentoukada": {
                title: "検討課題とさせていただきます (Kentoukadaitosaseteitadakimasu)",
                audioUrl: "audio/kentou.wav",
                analysis: "Literally 'making it a matter for consideration.' This signals that the proposal has hit a significant roadblock in the hierarchy."
            },
            "muzukashii": {
                title: "ちょっと難しい (Chottomuzukashii)",
                audioUrl: "audio/muzukashii.wav",
                analysis: "A textbook 'Soft No.' In the Cultural OS, 'difficult' means 'impossible,' and 'chotto' is the shock absorber for the listener."
            },
            "maemukini": {
                title: "前向きに検討いたします (Maemukinikentouitashimausu)",
                audioUrl: "audio/maemuki.wav",
                analysis: "A positive-sounding buffer that effectively delays a decision. It keeps the relationship warm without requiring immediate action."
            },
            "yoroshiku": {
                title: "よろしくね (Yoroshikune)",
                audioUrl: "audio/yoroshiku.wav",
                analysis: "The casual but firm version of 'Yoroshiku.' Used by superiors to signal that a task is now the subordinate's responsibility."
            },
            "goikenouka": {
                title: "ご意見を伺いたい (Goikenoukagaitai)",
                audioUrl: "audio/goiken.wav",
                analysis: "A vertical invitation for feedback. While it asks for an opinion, it acknowledges the status gap by using humble-polite phrasing."
            },
            "sekinino": {
                title: "責任を痛感し (Sekininotsukanshi)",
                audioUrl: "audio/tsukan.wav",
                analysis: "A heavy phrase used in formal accountability. It signals that the speaker 'keenly feels the responsibility' of a failure."
            },
            "isoganaktu": {
                title: "急がなくていいです (Isoganakuteiidesu)",
                audioUrl: "audio/isoganakute.wav",
                analysis: "Depending on context, this is either genuine kindness or a sign that the project has lost priority in the eyes of leadership."
            },
            "aruimide": {
                title: "ある意味で (Aruimide)",
                audioUrl: "audio/aruimi.wav",
                analysis: "A conversational pivot. It allows the speaker to introduce a conflicting view by framing it as just 'one way' of looking at things."
            },
            "gokaiooso": {
                title: "誤解を恐れずに (Gokaioosorezuni)",
                audioUrl: "audio/gokai.wav",
                analysis: "The 'Directness Shield.' The speaker is warning you that they are about to break social protocol and speak bluntly."
            },
            "korewakore": {
                title: "これはこれで (Korewakorede)",
                audioUrl: "audio/korewa.wav",
                analysis: "Implies that while the current result is acceptable, it is separate from the original goal. A subtle form of disappointment."
            },
            "kikudake": {
                title: "聞くだけ聞きます (Kikudakekikimasu)",
                audioUrl: "audio/kikudake.wav",
                analysis: "A boundary phrase. The speaker will listen out of politeness, but they are signaling they have no power or intent to change the outcome."
            },
            "maatamata": {
                title: "まあ、たまたま (Maa,tamatama)",
                audioUrl: "audio/tamatama.wav",
                analysis: "The 'Humility OS.' Attributing success to luck ('tamatama') prevents the speaker from standing out too much from the group."
            },
            "maasoudesu": {
                title: "まあ、そうですね (Maa,soudesune)",
                audioUrl: "audio/soudesune.wav",
                analysis: "The ultimate neutral filler. It acknowledges the other person's statement without agreeing, disagreeing, or committing to a thought."
            },
            "wakarima": {
                title: "わかりました (Wakarimashita)",
                audioUrl: "audio/wakarimashita.wav",
                analysis: "Signifies receipt of information, not agreement. A critical distinction in the Japanese Social Radar."
            },
            "iroiroari": {
                title: "いろいろありまして (Iroiroarimashite)",
                audioUrl: "audio/iroiro.wav",
                analysis: "A polite way to close off personal or difficult topics. It translates to 'various things happened,' signaling: 'Please don't ask more.'"
            },
            "oisogashii": {
                title: "お忙しいところ (Oisogashiitokoro)",
                audioUrl: "audio/oisogashii.wav",
                analysis: "The standard 'Opening Lubricant.' It acknowledges the other person's value by assuming they are busy and important."
            },
            "kouiumono": {
                title: "こういう者ですが (Kouiumonodesuga)",
                audioUrl: "audio/kouiu.wav",
                analysis: "Used during Meishi-koukan (business card exchange). It frames the speaker as 'someone like this,' a traditional humble posture."
            },
            "benkyousa": {
                title: "勉強させてください (Benkyousasetekudasai)",
                audioUrl: "audio/benkyou.wav",
                analysis: "The polite negotiator's code for: 'Please give me a discount' or 'Please lower the price so I can learn from this deal.'"
            },
            "souiukoto": {
                title: "そういうことなら (Souiukotonara)",
                audioUrl: "audio/souiu.wav",
                analysis: "Signals the transition from 'Negotiation' to 'Agreement.' It indicates the logic has been accepted and the deal is moving forward."
            }
        };
           
           
       window.addEventListener('message', function(e) {
            // 1. Safety Check: Only act if the button sends a 'phrase'
            if (e.data && e.data.phrase) {
                const key = e.data.phrase.trim().toLowerCase();
                const entry = radarData[key];

                if (entry) {
                    console.log("🎯 Masterpiece Analysis Triggered:", key);
                    const summaryElement = document.getElementById('ai-summary');
                    
                    // 2. Clear the 'Welcome' note
                    const note = document.getElementById('instruction-note');
                    if (note) note.style.display = 'none';

                    // 3. Build the Sidebar Content
                    summaryElement.innerHTML = `
                        <div class="updated-text">
                            <div class="analysis-header">
                                <h2>${entry.title}</h2>
                            </div>
                            
                            <div class="audio-container" style="margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #d4af37;">
                                <p style="font-size: 0.8rem; color: #888; margin-bottom: 8px; text-transform: uppercase;">Audio Nuance</p>
                                <audio controls src="${entry.audioUrl}" style="width: 100%; height: 35px;"></audio>
                            </div>

                            <div class="analysis-body" style="font-family: 'Georgia', serif; line-height: 1.8; color: #2c3e50;">
                                ${entry.analysis}
                            </div>
                        </div>
                    `;
                } else {
                    console.warn("⚠️ Data not found for:", key);
                }
            }
        });
    </script>

    <script src="https://public.flourish.studio/resources/embed.js"></script>

</body>
</html>
